# HalluZero GRPO Training Configuration
# Model: Qwen/Qwen3.5-9B on 8x A100-80GB

model:
  name_or_path: "Qwen/Qwen3.5-9B"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"

dataset:
  name: "openai/gsm8k"
  split: "train"
  max_prompt_length: 512
  max_completion_length: 1024

training:
  num_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"
  bf16: true
  gradient_checkpointing: true

grpo:
  num_generations: 4

lora:
  r: 64
  lora_alpha: 128
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  lora_dropout: 0.05
  task_type: "CAUSAL_LM"
  kl_coeff: 0.05
  clip_range: 0.2
  temperature: 0.7
  top_p: 0.95

zero_score:
  strategy: "curriculum"        # clip | temperature | curriculum | relabel
  clip_factor: 0.1              # gradient scale for 0-score samples when strategy=clip
  temperature_boost: 1.5        # temperature multiplier for 0-score samples
  curriculum_warmup_steps: 500  # steps before full 0-score inclusion
  relabel_epsilon: 0.01         # small positive reward for relabeling 0-score

logging:
  output_dir: "./results/grpo_halluzero_9b"
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  report_to: "none"
  run_name: "halluzero-grpo-9b"

evaluation:
  benchmarks:
    - "gsm8k"
    - "math"
    - "truthfulqa"
  num_samples: -1
  temperature: 0.0
  max_new_tokens: 1024
