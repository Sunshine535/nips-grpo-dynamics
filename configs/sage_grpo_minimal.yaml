method: COVER-GRPO

dataset:
  name: "openai/gsm8k"
  split: "train"

model:
  name: "Qwen/Qwen3.5-9B"

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 1
  num_generations: 4
  max_completion_length: 256
  gradient_checkpointing: false

lora:
  r: 64
  lora_alpha: 128
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  lora_dropout: 0.05
  task_type: "CAUSAL_LM"

sage:
  sage_mode: "full"
  success_threshold: 0.5
  failure_threshold: 0.0
  lambda_pair: 0.05
  lambda_pos: 0.0
  pair_batch_size: 1
  replay_warmup_steps: 50
  ref_coef: 1.0
  tasa_c: 0.5
  use_prompt_frontier: true
  use_age_decay: true
  n_min: 5
  max_exposure: 10
  age_tau: 200.0
